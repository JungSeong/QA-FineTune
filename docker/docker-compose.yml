services:
  exaone:
    # Exaone의 도커 환경을 띄워주는 컨테이너
    build:
      context: .
      dockerfile: Dockerfile.Exaone
    container_name: exaone
    image: exaone-vllm:latest
    entrypoint: [ "python3", "/app/vllm_launcher.py", "vllm", "infer" ]
    ports:
      - "8002:8000" # vLLM LLM (외부 -> 내부)
      - "8003:8001" # vLLM Embeddings
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    volumes:
      # 추후에 정확한 경로로 바꿀 필요가 있음
      - ../../LLM/model:/models
      - ../../LLM/embedding:/embeddings
      - ../main:/app
      - ../main/log:/app/log
    environment:
      - MODEL_BASE_DIR=/models
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=UTF-8
      - MCP_PORT=4200
      - VLLM_USE_V1=0  
      - VLLM_ENABLE_V1_MULTIPROCESSING=0
    ipc: host
