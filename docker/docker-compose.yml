  postgres:
    # postgresql db 환경을 띄워주는 컨테이너
    image: pgvector/pgvector:0.8.1-pg18-trixie
    container_name: postgres
    env_file: .env
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
  search-data:
    # 검색을 담당하는 컨테이너
    build:
      context: .
      dockerfile: Dockerfile.rag
    container_name: postgresql-rag
    ports:
      - "8080:4200"
    working_dir: /app # 작업 디렉토리를 /app으로 고정
    volumes:
      - ../main:/app
    environment:
      - MODEL_BASE_DIR=/models
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=UTF-8
      - MCP_PORT=4200
    command: [ "python3", "rag/search_contents_fastapi.py" ]
    restart: always
    env_file: .env
    depends_on:
      - postgres
volumes:
  pgdata:
